<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Stock Trading - News</title>
    <style>

        body {
            /* Margin 0 so backgrounds cover all of the screen */
            margin: 0;
            font-family: 'calibri';
            /* Slight contrast on main body of landing page */
            background-color: #e1e2e2;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background-color: white;
            border-bottom: 1px solid #e6e6e6;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 101;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #2563eb;
            /* remove link modifications */
            text-decoration: none;
        }

        .navLinks {
            display: flex;
            gap: 24px;
        }

        .navLinks a {
            text-decoration: none;
            color: #4b5563;
            font-weight: 500;
            transition: color 0.2s;
        }

        .navLinks a:hover {
            color: #2563eb;
        }

        .AuthenticatorButton {
            display: flex;
            gap: 16px;
        }

        .loginButton {
            background: none;
            border: none;
            color: #2563eb;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }

        .buttonSignup {
            background-color: #2563eb;
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        .buttonSignup:hover {
            background-color: #1d4ed8;
        }

        /* Container to manage the layout */
        .pageFixxerUpper {
            display: flex;
            flex: 1;
            position: relative;
            flex-direction: column;
            align-items: center;
            padding: 48px 32px;
        }

        .newsHeader {
            max-width: 900px;
            width: 100%;
            margin-bottom: 32px;
        }

        .newsHeader h1 {
            font-size: 32px;
            color: #111827;
            margin: 0;
        }

        .newsGrid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 900px;
            width: 100%;
        }

        .newsCard {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: row;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .newsCard:hover {
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        .newsImagePlaceholder {
            width: 200px;
            background-color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            text-align: center;
            padding: 10px;
        }

        .newsContent {
            padding: 24px;
            flex: 1;
        }

        .newsContent h3 {
            margin: 0 0 8px 0;
            font-size: 20px;
            color: #111827;
        }

        .newsContent p {
            font-size: 15px;
            line-height: 22px;
            color: #4b5563;
            margin: 0 0 16px 0;
        }

        .newsMeta {
            font-size: 13px;
            color: #9ca3af;
        }

        footer {
            background-color: #111827;
            color: #9ca3af;
            padding: 24px 32px;
            text-align: center;
            border-top: 1px solid #374151;
            position: relative;
            z-index: 101;
            margin-top: auto;
        }

        .footerText {
            margin: 4px 0;
            font-size: 13px;
        }

        .filterSection {
            max-width: 900px;
            width: 100%;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .filterGroup {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filterGroup label {
            font-weight: 600;
            color: #111827;
            display: flex;
            align-items: center;
        }

        .categoryButton {
            padding: 8px 16px;
            border: 2px solid #e6e6e6;
            border-radius: 8px;
            background-color: white;
            color: #4b5563;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .categoryButton:hover {
            border-color: #2563eb;
            color: #2563eb;
        }

        .categoryButton.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .sortGroup {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .sortGroup select {
            padding: 8px 12px;
            border: 2px solid #e6e6e6;
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            font-weight: 500;
            color: #4b5563;
        }

        .sortGroup select:focus {
            outline: none;
            border-color: #2563eb;
        }

        .loadingSpinner {
            text-align: center;
            padding: 32px;
            color: #4b5563;
        }

        .errorMessage {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            max-width: 900px;
            width: 100%;
        }

        .noResultsMessage {
            text-align: center;
            padding: 32px;
            color: #4b5563;
            font-size: 16px;
        }

    </style>
</head>
<body>

    <nav class = "navbar">
        <a href = "landingPage.html" class="logo">FantaStock</a>
        <div class = "navLinks">
            
            <a href = "portfolioPage.html">Portfolio</a>
            <a href = "stockTickerPage.html">Tickers</a>
            <a href = "newsPage.html">News</a>
            <a href = "leagueSelect.html">Leagues</a>

        </div>
        <div class = "AuthenticatorButton">
            
            <button class = "buttonSignup" onclick="window.location.href = 'createAccount.html'">Create Account</button>
            <button class = "loginButton" onclick="window.location.href = 'login.html'">Log in</button>

        </div>
    </nav>

    <div class = "pageFixxerUpper">
        
        <div class="newsHeader">
            <h1>Market News & Updates</h1>
        </div>

        <div class="filterSection">
            <div class="filterGroup">
                <label>Category:</label>
                <button class="categoryButton active" data-category="business">Business</button>
                <button class="categoryButton" data-category="technology">Technology</button>
                <button class="categoryButton" data-category="general">General</button>
                <button class="categoryButton" data-category="health">Health</button>
                <button class="categoryButton" data-category="science">Science</button>
            </div>
            
            <div class="sortGroup">
                <label>Sort by:</label>
                <select id="sortSelect">
                    <option value="publishedAt">Newest First</option>
                    <option value="relevancy">Most Relevant</option>
                    <option value="popularity">Most Popular</option>
                </select>
            </div>
        </div>

        <div id="errorContainer"></div>
        <div id="loadingContainer" class="loadingSpinner" style="display: none;">Loading articles...</div>
        <div class="newsGrid" id="newsGrid">
        </div>

    </div>

    <footer>

        <p class = "footerText">CP317 Software Engineering - Winter 2026</p>
        <p class = "footerText">Chrisitan Arruda, Landen Kurt, Kieran Mochrie, Colin Murray, Samson Obasuyi, Krishna Patel, Ishaan Ramphul, Aman Rana, Karl Richter, Deva Sandhu</p>
    
    </footer>

    <script>
        const API_KEY = 'af5603dd3c004b409e5a15186d122006';
        const CORS_PROXIES = [
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];
        
        let currentCategory = 'business';
        let currentSort = 'publishedAt';
        let currentProxyIndex = 0;

        // Category buttons
        document.querySelectorAll('.categoryButton').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.categoryButton').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                fetchNews();
            });
        });

        // Sort dropdown
        document.getElementById('sortSelect').addEventListener('change', function() {
            currentSort = this.value;
            fetchNews();
        });

        async function fetchNews() {
            const loadingContainer = document.getElementById('loadingContainer');
            const errorContainer = document.getElementById('errorContainer');
            const newsGrid = document.getElementById('newsGrid');

            loadingContainer.style.display = 'block';
            errorContainer.innerHTML = '';
            newsGrid.innerHTML = '';

            try {
                // NewsAPI endpoint
                let newsUrl = `https://newsapi.org/v2/top-headlines?category=${currentCategory}&language=en&apiKey=${API_KEY}`;
                
                let data = null;
                let lastError = null;
                
                for (let proxyUrl of CORS_PROXIES) {
                    try {
                        const fullUrl = proxyUrl + encodeURIComponent(newsUrl);
                        const response = await fetch(fullUrl, {
                            headers: {
                                'User-Agent': 'Mozilla/5.0'
                            }
                        });
                        
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        
                        const responseText = await response.text();
                        data = JSON.parse(responseText);
                        
                        if (data.articles) break; 
                    } catch (err) {
                        lastError = err;
                        continue; 
                    }
                }

                loadingContainer.style.display = 'none';

                if (!data || !data.articles) {
                    throw new Error('No articles found in response');
                }

                if (data.articles.length > 0) {
                    let articles = data.articles;
                    if (currentSort === 'publishedAt') {
                        articles.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
                    }
                    displayNews(articles);
                } else {
                    newsGrid.innerHTML = '<div class="noResultsMessage">No articles found for this category.</div>';
                }
            } catch (error) {
                loadingContainer.style.display = 'none';
                console.error('Fetch error:', error);
                errorContainer.innerHTML = `
                    <div class="errorMessage">
                        <strong>Unable to load articles.</strong> Check that your API key is valid at 
                        <a href="https://newsapi.org" target="_blank" style="color: #991b1b; text-decoration: underline;">newsapi.org</a>. 
                        Showing sample data for now.
                    </div>
                `;
                displaySampleNews();
            }
        }

        function displayNews(articles) {
            const newsGrid = document.getElementById('newsGrid');
            newsGrid.innerHTML = '';

            articles.slice(0, 10).forEach(article => {
                const newsCard = document.createElement('div');
                newsCard.className = 'newsCard';
                newsCard.style.cursor = 'pointer';
                
                const imageUrl = article.urlToImage || 'https://via.placeholder.com/200x120?text=News';
                const title = article.title || 'Untitled';
                const description = article.description || 'No description available';
                const date = new Date(article.publishedAt).toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
                const source = article.source?.name || 'Unknown Source';

                newsCard.innerHTML = `
                    <img src="${imageUrl}" alt="${title}" style="width: 200px; height: 150px; object-fit: cover;">
                    <div class="newsContent">
                        <h3>${title}</h3>
                        <p>${description}</p>
                        <div class="newsMeta">${date} • ${source}</div>
                    </div>
                `;

                newsCard.addEventListener('click', () => {
                    if (article.url) {
                        window.open(article.url, '_blank');
                    }
                });

                newsGrid.appendChild(newsCard);
            });
        }

        function displaySampleNews() {
            const sampleArticles = [
                {
                    title: "Tech Giants Report Strong Quarterly Growth",
                    description: "Major technology companies exceed earnings expectations with record profits.",
                    urlToImage: "https://via.placeholder.com/200x120?text=Business",
                    publishedAt: "2026-03-23T10:00:00Z",
                    source: { name: "Tech News Daily" },
                    url: "#"
                },
                {
                    title: "Markets Rally on Positive Economic Data",
                    description: "Stock indices climb higher as investors react to better-than-expected economic reports.",
                    urlToImage: "https://via.placeholder.com/200x120?text=Market",
                    publishedAt: "2026-03-22T15:30:00Z",
                    source: { name: "Financial Times" },
                    url: "#"
                },
                {
                    title: "New AI Regulations Announced",
                    description: "Governments move to establish clear guidelines for artificial intelligence development and deployment.",
                    urlToImage: "https://via.placeholder.com/200x120?text=Tech",
                    publishedAt: "2026-03-21T09:15:00Z",
                    source: { name: "Tech Policy News" },
                    url: "#"
                }
            ];
            displayNews(sampleArticles);
        }

        window.addEventListener('DOMContentLoaded', fetchNews);
    </script>

</body>
</html>
