<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FantaStock - Market Tickers</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background-color: white;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #2563eb;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .navLinks {
            display: flex;
            gap: 24px;
        }

        .navLinks a {
            text-decoration: none;
            color: #4b5563;
            font-weight: 600;
            transition: color 0.2s;
        }

        .navLinks a:hover {
            color: #2563eb;
        }

        /* Layout */
        .pageContainer {
            display: flex;
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .mainContent {
            flex: 1;
            padding: 32px;
        }

        .dashboardHeader h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 24px 0;
        }

        .dashboardHeader span { color: #2563eb; }

        /* Search Bar */
        .searchContainer {
            margin-bottom: 32px;
            position: relative;
        }

        .searchInput {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .searchInput:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Grid System */
        .tickerGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .statCard {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .statCard:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #2563eb;
        }

        .companyName {
            font-size: 12px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .tickerSymbol {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .priceRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f3f4f6;
            padding-top: 12px;
        }

        .priceValue { font-weight: 700; font-size: 18px; }
        .sectorBadge {
            background: #eff6ff;
            color: #1e40af;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: white;
            border-left: 1px solid #e5e7eb;
            padding: 32px 24px;
            display: none; /* Hidden on small screens */
        }

        @media (min-width: 1024px) { .sidebar { display: block; } }

        .sidebarHeader { font-weight: 800; margin-bottom: 20px; font-size: 18px; }

        .trendingItem {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        /* Sentinel & Loading */
        #sentinel {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            grid-column: 1 / -1;
        }

        footer {
            background: #111827;
            color: #9ca3af;
            padding: 32px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="landingPage.html" class="logo">FantaStock</a>
        <div class="navLinks">
            <a href="portfolioPage.html">Portfolio</a>
            <a href="stockTickerPage.html" style="color: #2563eb;">Tickers</a>
            <a href="newsPage.html">News</a>
            <a href="leagueSelect.html">Leagues</a>
        </div>
        <div class="AuthenticatorButton"></div>
    </nav>

    <div class="pageContainer">
        <main class="mainContent">
            <div class="dashboardHeader">
                <h1>Market <span>Explorer</span></h1>
            </div>

            <div class="searchContainer">
                <input type="text" id="tickerSearch" class="searchInput" placeholder="Search by name or symbol (e.g. AAPL)...">
            </div>

            <div class="tickerGrid" id="tickerGrid">
                </div>

            <div id="sentinel">
                <p id="statusMsg">Scanning the markets...</p>
            </div>
        </main>

        <aside class="sidebar">
            <div class="sidebarHeader">Trending Today</div>
            <div class="trendingItem"><strong>AAPL</strong> <span style="color: #10b981;">$182.63</span></div>
            <div class="trendingItem"><strong>TSLA</strong> <span style="color: #ef4444;">$202.11</span></div>
            <div class="trendingItem"><strong>NVDA</strong> <span style="color: #10b981;">$726.13</span></div>
        </aside>
    </div>

    <footer>
        <p>CP317 Software Engineering — Winter 2026</p>
    </footer>

    <script>
        let offset = 0;
        const limit = 12;
        let isFull = false;
        let isLoading = false;

        const grid = document.getElementById('tickerGrid');
        const statusMsg = document.getElementById('statusMsg');
        const searchInput = document.getElementById('tickerSearch');

        async function fetchStocks(query = '', reset = false) {
            if (isLoading || (isFull && !reset)) return;
            isLoading = true;

            if (reset) {
                offset = 0;
                grid.innerHTML = '';
                isFull = false;
                statusMsg.textContent = "Loading more tickers...";
            }

            try {
                const response = await fetch(`/api/stocks?limit=${limit}&offset=${offset}&search=${query}`);
                const stocks = await response.json();

                if (stocks.length < limit) {
                    isFull = true;
                    statusMsg.textContent = query ? "No more matches." : "You've reached the end of the market.";
                }

                stocks.forEach(stock => {
                    const card = document.createElement('div');
                    card.className = 'statCard';
                    card.onclick = () => window.location.href = `detailedTicker.html?symbol=${stock.tickerSymbol}`;
                    
                    card.innerHTML = `
                        <div class="companyName">${stock.companyName}</div>
                        <div class="tickerSymbol">${stock.tickerSymbol}</div>
                        <div class="priceRow">
                            <span class="priceValue">$${parseFloat(stock.currentPrice).toFixed(2)}</span>
                            <span class="sectorBadge">${stock.sector || 'Equity'}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                offset += limit;
            } catch (err) {
                console.error("Fetch error:", err);
                statusMsg.textContent = "Unable to connect to market database.";
            } finally {
                isLoading = false;
            }
        }

        // Intersection Observer for Infinite Scroll
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isFull) {
                fetchStocks(searchInput.value);
            }
        }, { rootMargin: '200px' }); // Load 200px before reaching bottom

        observer.observe(document.getElementById('sentinel'));

        // Search with Debounce
        let timeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => fetchStocks(e.target.value, true), 400);
        });

        // Quick Jump on Enter
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && searchInput.value.length > 0) {
                window.location.href = `detailedTicker.html?symbol=${searchInput.value.toUpperCase()}`;
            }
        });
    </script>
</body>
</html>
